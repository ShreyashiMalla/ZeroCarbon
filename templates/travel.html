<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Details | ZeroCarbon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0f172a;      /* Slate 900 */
            --secondary: #334155;    /* Slate 700 */
            --accent: #10b981;       /* Emerald 500 */
            --accent-hover: #059669; /* Emerald 600 */
            --bg-body: #f8fafc;      /* Slate 50 */
            --bg-card: #ffffff;
            --text-main: #1e293b;    /* Slate 800 */
            --text-muted: #64748b;   /* Slate 500 */
            --border-light: #e2e8f0; /* Slate 200 */
            --focus-ring: rgba(16, 185, 129, 0.2);
        }

        body {
            min-height: 100vh;
            margin: 0;
            /* Modern ambient mesh-like gradient */
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, hsla(160,100%,74%,0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(210,100%,80%,0.15) 0px, transparent 50%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
        }

        /* ===== CARD ===== */
        .form-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 480px; /* Slightly narrower for better reading width */
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* ===== HEADER ===== */
        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background: #ecfdf5; /* Emerald 50 */
            border-radius: 16px;
            font-size: 28px;
            margin-bottom: 16px;
        }

        .form-header h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.025em;
        }

        .form-header p {
            margin: 0;
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* ===== INFO BOX ===== */
        .info-box {
            background: #f1f5f9; /* Slate 100 */
            border-left: 4px solid var(--accent);
            border-radius: 8px 12px 12px 8px;
            padding: 16px 20px;
            margin-bottom: 32px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--secondary);
        }

        .info-box strong {
            color: var(--primary);
            font-weight: 600;
        }

        /* ===== DJANGO FORM STYLING ===== */
        form p {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        form label {
            font-weight: 500;
            font-size: 14px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        form input,
        form select,
        form textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border-light);
            background-color: #fafafa;
            font-size: 15px;
            font-family: inherit;
            color: var(--text-main);
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        form input::placeholder {
            color: #94a3b8;
        }

        form input:hover,
        form select:hover {
            border-color: #cbd5e1;
        }

        form input:focus,
        form select:focus {
            outline: none;
            background-color: #ffffff;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        /* Help text generated by Django */
        form span.helptext {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* ===== SUBMIT BUTTON ===== */
        .submit-btn {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .submit-btn:hover {
            background: #1e293b;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* ===== BACK LINK ===== */
        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-muted);
            transition: color 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .back-link a:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>

<div class="form-card">
    <div class="form-header">
        <div class="icon-wrapper">🚗</div>
        <h2>Travel Logs</h2>
        <p>Record your transit data to analyze your mobility carbon footprint.</p>
    </div>

    <div class="info-box">
        <strong>Quick Guide:</strong><br>
        Select your mode of transport (e.g., Car, Flight) and enter the total distance traveled in <strong>kilometers (km)</strong>.
    </div>

    <form method="post">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit" class="submit-btn">
            Calculate Impact
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </button>
    </form>

    <div class="back-link">
        <a href="/dashboard/">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Dashboard
        </a>
    </div>
</div>

</body>
</html>
