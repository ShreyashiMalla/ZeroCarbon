<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carbon Advisor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #10B981;
    --primary-dark: #059669;
    --secondary: #3B82F6;
    --dark: #111827;
    --light: #F9FAFB;
    --card-bg: #FFFFFF;
    --surface: #F3F4F6;
    --text: #374151;
    --text-light: #6B7280;
    --danger: #EF4444;
    --warning: #F59E0B;
    --success: #10B981;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    --radius: 12px;
    --radius-lg: 16px;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* Modern Glassmorphism Container */
.chat-container {
    width: 100%;
    max-width: 500px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    border-radius: var(--radius-lg);
    border: 1px solid rgba(255, 255, 255, 0.1);
    overflow: hidden;
    box-shadow: var(--shadow-xl);
    display: flex;
    flex-direction: column;
    height: 700px;
}

/* Chat Header */
.chat-header {
    background: rgba(255, 255, 255, 0.05);
    padding: 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    gap: 16px;
}

.advisor-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 28px;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
}

.header-text h1 {
    font-size: 24px;
    font-weight: 700;
    color: white;
    margin-bottom: 4px;
}

.header-text p {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.7);
    font-weight: 400;
}

/* Chat Messages Area */
.messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* Message Bubbles */
.msg {
    max-width: 80%;
    padding: 16px 20px;
    border-radius: var(--radius-lg);
    line-height: 1.5;
    font-size: 14px;
    position: relative;
    animation: messageAppear 0.3s ease-out;
}

@keyframes messageAppear {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* User Messages */
.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    border-bottom-right-radius: 4px;
    margin-left: auto;
}

.user::before {
    content: '';
    position: absolute;
    right: -8px;
    top: 0;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 0 0 16px 16px;
    border-color: transparent transparent var(--primary) transparent;
}

.user-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}

.user-icon {
    width: 24px;
    height: 24px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
}

.user-label {
    font-size: 12px;
    font-weight: 600;
    opacity: 0.9;
}

/* Bot Messages */
.bot {
    align-self: flex-start;
    background: rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-bottom-left-radius: 4px;
}

.bot::before {
    content: '';
    position: absolute;
    left: -8px;
    top: 0;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 0 16px 16px 0;
    border-color: transparent rgba(255, 255, 255, 0.05) transparent transparent;
}

.bot-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}

.bot-icon {
    width: 24px;
    height: 24px;
    background: rgba(16, 185, 129, 0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary);
    font-size: 12px;
}

.bot-label {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.7);
}

/* Input Area */
.input-area {
    background: rgba(255, 255, 255, 0.05);
    padding: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.input-wrapper {
    display: flex;
    gap: 12px;
    align-items: center;
}

#input {
    flex: 1;
    padding: 16px 20px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: var(--radius);
    color: white;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    transition: var(--transition);
}

#input:focus {
    outline: none;
    border-color: var(--primary);
    background: rgba(255, 255, 255, 0.05);
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
}

#input::placeholder {
    color: rgba(255, 255, 255, 0.4);
}

button {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 16px 28px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 120px;
    justify-content: center;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
}

button:active {
    transform: translateY(0);
}

/* Suggestions */
.suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
    padding: 0 24px;
}

.suggestion-btn {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.8);
    padding: 10px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: var(--transition);
}

.suggestion-btn:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: var(--primary);
    color: white;
}

/* Welcome Message */
.welcome-message {
    text-align: center;
    padding: 24px;
    background: rgba(255, 255, 255, 0.02);
    border-radius: var(--radius);
    margin: 0 24px 24px;
    border: 1px dashed rgba(255, 255, 255, 0.1);
}

.welcome-message h3 {
    color: white;
    margin-bottom: 12px;
    font-weight: 600;
}

.welcome-message p {
    color: rgba(255, 255, 255, 0.6);
    font-size: 14px;
    line-height: 1.6;
}

/* Scrollbar Styling */
.messages::-webkit-scrollbar {
    width: 6px;
}

.messages::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.02);
    border-radius: 3px;
}

.messages::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
}

.messages::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
}

/* Responsive Design */
@media (max-width: 640px) {
    body {
        padding: 10px;
    }
    
    .chat-container {
        height: 90vh;
        max-width: 100%;
    }
    
    .msg {
        max-width: 90%;
    }
    
    .input-wrapper {
        flex-direction: column;
    }
    
    button {
        width: 100%;
    }
    
    .suggestions {
        padding: 0 20px;
    }
    
    .suggestion-btn {
        font-size: 12px;
        padding: 8px 14px;
    }
}

/* Typing Indicator */
.typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 16px 20px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: var(--radius-lg);
    border: 1px solid rgba(255, 255, 255, 0.08);
    align-self: flex-start;
    margin-bottom: 16px;
    display: none;
}

.typing-dot {
    width: 8px;
    height: 8px;
    background: var(--primary);
    border-radius: 50%;
    animation: typing 1.4s infinite ease-in-out;
}

.typing-dot:nth-child(1) { animation-delay: -0.32s; }
.typing-dot:nth-child(2) { animation-delay: -0.16s; }

@keyframes typing {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-10px); }
}
</style>
</head>

<body>
<div class="chat-container">
    <!-- Chat Header -->
    <div class="chat-header">
        <div class="advisor-icon">
            <i class="fas fa-robot"></i>
        </div>
        <div class="header-text">
            <h1>Carbon Advisor</h1>
            <p>AI-powered guidance for reducing your carbon footprint</p>
        </div>
    </div>

    <!-- Welcome Message -->
    <div class="welcome-message">
        <h3>Hello! I'm your Carbon Advisor 🤖</h3>
        <p>Ask me anything about reducing your carbon footprint, sustainable living, or environmental impact.</p>
    </div>

    <!-- Quick Suggestions -->
    <div class="suggestions">
        <button class="suggestion-btn" onclick="useSuggestion('How can I reduce my electricity consumption?')">
            ⚡ Reduce Electricity
        </button>
        <button class="suggestion-btn" onclick="useSuggestion('What are sustainable food choices?')">
            🍽️ Sustainable Food
        </button>
        <button class="suggestion-btn" onclick="useSuggestion('Best ways to reduce travel emissions?')">
            🚗 Travel Emissions
        </button>
        <button class="suggestion-btn" onclick="useSuggestion('How to properly segregate waste?')">
            ♻️ Waste Segregation
        </button>
    </div>

    <!-- Messages Container -->
    <div id="messages" class="messages">
        <!-- Messages will appear here -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-wrapper">
            <input id="input" type="text" placeholder="Ask about your carbon habits..." 
                   onkeypress="handleKeyPress(event)">
            <button onclick="send()">
                <i class="fas fa-paper-plane"></i> Send
            </button>
        </div>
    </div>
</div>

<script>
// Show welcome message from bot
window.addEventListener('DOMContentLoaded', function() {
    const messages = document.getElementById("messages");
    const welcomeMsg = `<div class="msg bot">
        <div class="bot-header">
            <div class="bot-icon">
                <i class="fas fa-robot"></i>
            </div>
            <div class="bot-label">Carbon Advisor</div>
        </div>
        Hello! I'm your AI Carbon Advisor. I can help you with:<br><br>
        • Reducing electricity consumption<br>
        • Sustainable food choices<br>
        • Eco-friendly transportation<br>
        • Waste management<br>
        • General carbon footprint reduction<br><br>
        What would you like to know about today?
    </div>`;
    
    setTimeout(() => {
        messages.innerHTML += welcomeMsg;
        messages.scrollTop = messages.scrollHeight;
    }, 300);
});

function useSuggestion(text) {
    document.getElementById("input").value = text;
}

function handleKeyPress(event) {
    if (event.key === 'Enter') {
        send();
    }
}

function send(){
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");
    const typingIndicator = document.getElementById("typingIndicator");

    if(!input.value.trim()) return;

    // Add user message
    messages.innerHTML += `<div class="msg user">
        <div class="user-header">
            <div class="user-icon">
                <i class="fas fa-user"></i>
            </div>
            <div class="user-label">You</div>
        </div>
        ${input.value}
    </div>`;

    // Show typing indicator
    typingIndicator.style.display = 'flex';
    
    // Scroll to bottom
    messages.scrollTop = messages.scrollHeight;

    // Store the user message
    const userMessage = input.value;
    input.value = "";

    // Send to backend
    fetch("/dashboard/carbon-advisor/chat/",{
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: userMessage })
    })
    .then(r => r.json())
    .then(d => {
        // Hide typing indicator
        typingIndicator.style.display = 'none';
        
        // Add bot response
        messages.innerHTML += `<div class="msg bot">
            <div class="bot-header">
                <div class="bot-icon">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="bot-label">Carbon Advisor</div>
            </div>
            ${d.reply}
        </div>`;
        
        // Scroll to bottom
        messages.scrollTop = messages.scrollHeight;
    })
    .catch(error => {
        // Hide typing indicator
        typingIndicator.style.display = 'none';
        
        // Show error message
        messages.innerHTML += `<div class="msg bot">
            <div class="bot-header">
                <div class="bot-icon">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <div class="bot-label">System</div>
            </div>
            Sorry, I encountered an error. Please try again in a moment.
        </div>`;
        
        // Scroll to bottom
        messages.scrollTop = messages.scrollHeight;
    });
}
</script>
</body>
</html>
